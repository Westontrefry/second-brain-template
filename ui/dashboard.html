<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Second Brain — dashboard</title>
<style>
  :root { --strong:#1D9E75; --weak:#EF9F27; --hot:#D85A30;
          --ink:#2c2c2a; --muted:#77766f; --line:#d9d7ce; --bg:#faf9f5; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system, "Segoe UI", sans-serif;
         color:var(--ink); background:var(--bg); }
  header { display:flex; gap:14px; align-items:center; padding:10px 16px;
           border-bottom:1px solid var(--line); background:#fff; flex-wrap:wrap; }
  header h1 { font-size:15px; font-weight:600; margin:0 8px 0 0; }
  header label { font-size:12.5px; color:var(--muted); display:flex; gap:5px; align-items:center; }
  select { font:inherit; font-size:12.5px; padding:2px 4px; }
  header a { font-size:12.5px; padding:3px 10px; border:1px solid var(--line);
             border-radius:6px; background:#fff; color:var(--ink); text-decoration:none; }
  #cards { display:flex; flex-wrap:wrap; gap:16px; padding:16px; align-items:flex-start; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px;
          padding:14px 16px; box-shadow:0 4px 18px rgba(0,0,0,.06); }
  .card h2 { font-size:13px; margin:0 0 2px; }
  .card .sub { color:var(--muted); font-size:11.5px; margin-bottom:8px; }
  .axis text, .tick text { font-size:10.5px; fill:var(--muted); }
  .empty { color:var(--muted); font-size:12.5px; padding:30px 10px; max-width:340px; }
  .legend { display:flex; gap:14px; font-size:11.5px; color:var(--muted); margin-top:6px; }
  .swatch { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:4px; vertical-align:-1px; }
</style>
</head>
<body>
<header>
  <h1>Second Brain — dashboard</h1>
  <label>Goal
    <select id="goalSel"></select>
  </label>
  <a href="index.html">← graph</a>
</header>
<div id="cards">
  <div class="card" id="radarCard">
    <h2>Goal readiness radar</h2>
    <div class="sub">evidenced level vs required level per roadmap topic</div>
    <div id="radar"></div>
    <div class="legend">
      <span><span class="swatch" style="background:var(--strong)"></span>evidenced</span>
      <span><span class="swatch" style="border:1.5px dashed var(--hot); background:none"></span>required</span>
    </div>
  </div>
  <div class="card" id="scatterCard">
    <h2>Confidence divergence</h2>
    <div class="sub">self-confidence vs AI-assessed level per topic — dots below the line are overconfidence</div>
    <div id="scatter"></div>
  </div>
</div>
<script src="d3.v7.min.js"></script>
<script src="graph.data.js"></script>
<script>
if (!window.GRAPH) {
  document.getElementById('cards').innerHTML =
    '<div class="empty">No graph data. Run: <code>python -m brain ui</code></div>';
} else {
const G = window.GRAPH;

// ---- goal selector: only goals that have roadmap requirements ----
const reqGoals = new Set();
G.nodes.forEach(n => (n.requirements || []).forEach(r => reqGoals.add(r.goal)));
const goals = G.goals.filter(g => reqGoals.has(g.id));
const sel = document.getElementById('goalSel');
goals.forEach(g => {
  const o = document.createElement('option');
  o.value = g.id; o.textContent = g.title;
  sel.appendChild(o);
});
sel.addEventListener('change', () => drawRadar(sel.value));

// ---- radar ----
function axesFor(gid) {
  const axes = [];
  G.nodes.forEach(n => (n.requirements || []).forEach(r => {
    if (r.goal === gid) axes.push({
      name: r.name, required: r.required,
      evidenced: Math.min(n.evidenced, 5), missing: n.type === 'missing',
    });
  }));
  return axes.sort((a, b) => a.name.localeCompare(b.name));
}

function drawRadar(gid) {
  const axes = axesFor(gid);
  const W = 620, H = 440, cx = W / 2, cy = H / 2 + 6, R = 140, MAX = 5;
  const root = d3.select('#radar');
  root.selectAll('*').remove();
  if (!axes.length) {
    root.append('div').attr('class', 'empty')
      .text('No roadmap for this goal yet.');
    return;
  }
  const svg = root.append('svg').attr('width', W).attr('height', H);
  const angle = i => (Math.PI * 2 * i) / axes.length - Math.PI / 2;
  const pt = (i, v) => [cx + Math.cos(angle(i)) * R * (v / MAX),
                        cy + Math.sin(angle(i)) * R * (v / MAX)];
  // rings
  for (let lvl = 1; lvl <= MAX; lvl++) {
    svg.append('polygon')
      .attr('points', axes.map((_, i) => pt(i, lvl).join(',')).join(' '))
      .attr('fill', 'none').attr('stroke', 'var(--line)');
  }
  // spokes + labels
  axes.forEach((a, i) => {
    const [x, y] = pt(i, MAX);
    svg.append('line').attr('x1', cx).attr('y1', cy).attr('x2', x).attr('y2', y)
      .attr('stroke', 'var(--line)');
    const [lx, ly] = pt(i, MAX + 1.25);
    svg.append('text').attr('x', lx).attr('y', ly)
      .attr('text-anchor', lx < cx - 4 ? 'end' : lx > cx + 4 ? 'start' : 'middle')
      .attr('font-size', '10.5px')
      .attr('fill', a.missing ? 'var(--hot)' : 'var(--muted)')
      .text(a.name.length > 26 ? a.name.slice(0, 24) + '…' : a.name);
  });
  // required outline
  svg.append('polygon')
    .attr('points', axes.map((a, i) => pt(i, a.required).join(',')).join(' '))
    .attr('fill', 'none').attr('stroke', 'var(--hot)')
    .attr('stroke-width', 1.5).attr('stroke-dasharray', '5 4');
  // evidenced fill
  svg.append('polygon')
    .attr('points', axes.map((a, i) => pt(i, a.evidenced).join(',')).join(' '))
    .attr('fill', 'var(--strong)').attr('fill-opacity', .25)
    .attr('stroke', 'var(--strong)').attr('stroke-width', 1.5);
}

// ---- divergence scatter ----
function drawScatter() {
  const pts = G.nodes.filter(n =>
    n.type === 'topic' && n.selfConfidence > 0 && n.aiConfidence != null);
  const unassessed = G.nodes.filter(n =>
    n.type === 'topic' && n.selfConfidence > 0 && n.aiConfidence == null).length;
  const root = d3.select('#scatter');
  root.selectAll('*').remove();
  if (!pts.length) {
    root.append('div').attr('class', 'empty').html(
      'No AI assessments yet — <code>/quiz</code> a topic to start building ' +
      'evidence. Once <code>brain assess</code> records levels, every assessed ' +
      'topic appears here plotted against your self-confidence. ' +
      `(${unassessed} topics carry self-confidence and await assessment.)`);
    return;
  }
  const W = 460, H = 430, M = {t: 14, r: 16, b: 38, l: 38};
  const x = d3.scaleLinear([0, 5], [M.l, W - M.r]);
  const y = d3.scaleLinear([0, 5], [H - M.b, M.t]);
  const svg = root.append('svg').attr('width', W).attr('height', H);
  svg.append('g').attr('transform', `translate(0,${H - M.b})`)
    .attr('class', 'axis').call(d3.axisBottom(x).ticks(5));
  svg.append('g').attr('transform', `translate(${M.l},0)`)
    .attr('class', 'axis').call(d3.axisLeft(y).ticks(5));
  svg.append('text').attr('x', W / 2).attr('y', H - 6).attr('text-anchor', 'middle')
    .attr('font-size', '11px').attr('fill', 'var(--muted)').text('self-confidence');
  svg.append('text').attr('transform', `translate(11,${H / 2}) rotate(-90)`)
    .attr('text-anchor', 'middle').attr('font-size', '11px')
    .attr('fill', 'var(--muted)').text('AI-assessed level');
  // calibration diagonal
  svg.append('line').attr('x1', x(0)).attr('y1', y(0)).attr('x2', x(5)).attr('y2', y(5))
    .attr('stroke', 'var(--line)').attr('stroke-dasharray', '4 4');
  svg.selectAll('circle').data(pts).join('circle')
    .attr('cx', d => x(d.selfConfidence)).attr('cy', d => y(d.aiConfidence))
    .attr('r', 5)
    .attr('fill', d => d.aiConfidence < d.selfConfidence ? 'var(--hot)' : 'var(--strong)')
    .attr('fill-opacity', .75)
    .append('title')
    .text(d => `${d.label}: self ${d.selfConfidence}, assessed ${d.aiConfidence}`);
  svg.selectAll('text.pt').data(pts).join('text').attr('class', 'pt')
    .attr('x', d => x(d.selfConfidence) + 7).attr('y', d => y(d.aiConfidence) + 3)
    .attr('font-size', '10px').attr('fill', 'var(--muted)').text(d => d.label);
}

if (goals.length) drawRadar(goals[0].id);
else document.getElementById('radarCard').innerHTML +=
  '<div class="empty">No roadmaps found under goals/roadmaps/.</div>';
drawScatter();
}
</script>
</body>
</html>
