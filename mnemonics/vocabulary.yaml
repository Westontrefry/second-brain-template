# Mnemonic vocabulary — the cast of characters and places mnemonics draw on.
#
# Each symbol carries global associations (flavors) that get borrowed for
# task-specific scenes: a memorable global association makes the new
# connection stickier. `used_for` is the usage ledger — topics whose saved
# scenes borrowed this symbol (kept current by the /mnemonic skill so fresh
# mints can prefer less-worn symbols).
#
# pack values:
#   starter  — the shipped set. PUBLIC-DOMAIN FIGURES ONLY (mythology,
#              folklore, pre-1929 literature). Text names only, never
#              imagery. No franchise IP, no real people. This rule is
#              locked.
#   personal — entries the owner added. Private by definition: never shared
#              anywhere, never displayed outside this machine. Any
#              character, place, or media you know cold is fair game
#              here — that is the legally-clean door for franchise figures.
#
# Managed by the /mnemonic skill. Hand-editing is fine; keep the shape.

symbols:
