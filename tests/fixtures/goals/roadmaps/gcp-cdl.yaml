# Roadmap: Google Cloud Digital Leader (DRAFT — the user review)
# Structured from the CDL exam guide content areas (conceptual cert — verify the
# current section list against the official exam guide before relying on weights).
# required_level 2 = comprehension per rubrics/depth.yaml: CDL is a multiple-choice
# conceptual exam, not hands-on. aliases are keyed to typical CDL note vocabulary.

goal: gcp-cdl
topics:
  - id: digital-transformation
    name: Digital transformation with Google Cloud
    required_level: 2
    prereqs: []
    aliases: [digital transformation, cloud adoption, cloud history, innovation]

  - id: cloud-concepts
    name: Cloud concepts (IaaS/PaaS/SaaS, deployment models, infrastructure)
    required_level: 2
    prereqs: [digital-transformation]
    aliases: [cloud computing, iaas paas saas, deployment models, cloud infrastructure,
              regions and zones, edge network, bandwidth latency]

  - id: financial-governance
    name: Cloud financial governance (CapEx/OpEx, TCO, cost management)
    required_level: 2
    prereqs: [cloud-concepts]
    aliases: [cost management, capex opex, tco, total cost of ownership]

  - id: data-transformation
    name: Exploring data transformation (databases, warehouses, analytics)
    required_level: 2
    prereqs: [cloud-concepts]
    aliases: [data management, data analysis, data quality, data governance,
              streaming analytics, bigquery, looker, database migration, managed databases]

  - id: ai-innovation
    name: Innovating with AI (ML options, generative AI, AI tools)
    required_level: 2
    prereqs: [data-transformation]
    aliases: [ai tools, generative ai, gemini, llms, ai models, multimodal models,
              ai agents, prompt engineering, machine learning basics]

  - id: responsible-ai
    name: Responsible AI and AI governance
    required_level: 2
    prereqs: [ai-innovation]
    aliases: [responsible ai, ai ethics]

  - id: modernization
    name: Modernizing infrastructure and applications
    required_level: 2
    prereqs: [cloud-concepts]
    aliases: [migration, application modernization, hybrid cloud, google workspace]

  - id: trust-security
    name: Trust, security, and compliance (shared responsibility)
    required_level: 2
    prereqs: [cloud-concepts]
    aliases: [security, shared responsibility, privacy, compliance, encryption]

  - id: scaling-operations
    name: Scaling with Google Cloud operations (SRE, support, sustainability)
    required_level: 2
    prereqs: [modernization]
    aliases: [sre, observability, cloud monitoring, sustainability operations]
