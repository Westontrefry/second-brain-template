name: CI

# Runs on every push and PR. The `sanitize` job is the guard that this PUBLIC
# template never grows personal data or upstream-only artifacts — it needs no
# dependencies, so it can't flake and always runs. `test` runs the fast suite.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sanitize:
    name: Sanitization gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the check can see everything tracked
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for personal data / upstream-only artifacts
        run: python scripts/check_sanitization.py

  test:
    name: Fast test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cockpit]"
          pip install -r requirements-dev.txt
      - name: Run tests (no real embeddings)
        run: pytest -m "not e2e" -q

  # Ruff is a standalone static linter — no project deps needed, so this job
  # stays fast and never waits on the ML stack. Config lives in pyproject.toml.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.6"
      - name: Ruff check
        run: ruff check .

  # Mypy reads the sources directly; ignore_missing_imports (pyproject.toml) lets
  # it skip the un-stubbed ML deps, so this job also avoids installing them.
  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install "mypy>=1.11"
      - name: Mypy check
        run: mypy brain/

  # Full-history secret scan. gitleaks-action is free for public repos on
  # personal accounts (a license is only required for GitHub Organizations).
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency CVE scan. Fails only on fixable HIGH/CRITICAL advisories so the
  # gate stays actionable (unfixed CVEs with no upstream patch don't block).
  # Runs trivy from its official ghcr image rather than trivy-action, whose
  # self-install step is unreliable on current runners; the image + DB pull
  # from ghcr.io (GitHub-hosted, no rate limits) instead.
  deps:
    name: Dependency CVE scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/aquasecurity/trivy:0.65.0 fs \
            --scanners vuln --severity CRITICAL,HIGH \
            --ignore-unfixed --exit-code 1 --no-progress /repo
